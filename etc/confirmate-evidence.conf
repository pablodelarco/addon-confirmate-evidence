# =============================================================================
# addon-confirmate-evidence - Configuration
# =============================================================================
# Evidence Collection Gateway for OpenNebula -> Confirmate integration
# Part of the EMERALD project (EU Horizon Europe, Grant No. 101120688)
# =============================================================================

confirmate:
  # ======================= LOCAL TESTING (default) ===========================
  # Talks to an all-in-one Confirmate (`bin/confirmate`) started with
  # `--db-in-memory` and, typically, `--auth-enabled=false`. These values are
  # for local development only; do NOT point them at a real deployment.
  endpoint: "http://localhost:8080"

  auth:
    # When the orchestrator runs with --auth-enabled=false, leave this false
    # and no Authorization header is sent.
    enabled: false

    # OAuth 2.0 client_credentials against Confirmate's *embedded* OAuth server.
    token_url: "http://localhost:8080/v1/auth/token"
    client_id: "confirmate"
    client_secret: "confirmate"

    # Or bypass the OAuth flow with a pre-generated token (testing/debugging):
    # static_token: "eyJhbGciOi..."

  # Optional: an extra CA bundle to trust IN ADDITION to the host's system
  # roots. Needed only if the OpenNebula host's trust store lacks the CA that
  # signed the Confirmate / Keycloak TLS certificates. Certificate
  # verification (VERIFY_PEER) always stays ON.
  # tls:
  #   ca_file: "/etc/ssl/certs/emerald-ca.pem"

  # ==================== PRODUCTION TEMPLATE (Keycloak) =======================
  # Uncomment, fill in the real values from your EMERALD deployment, and DELETE
  # the local block above. In production the Evidence Store, the Orchestrator
  # and Keycloak are SEPARATE hosts, and authentication is handled by Keycloak
  # (not Confirmate's embedded OAuth). Ask the platform operator for a dedicated
  # service client (client_id + client_secret) in your Keycloak realm.
  # The live Pilot 4 values are kept out of this public repo on purpose; get
  # them from your deployment owner.
  #
  # endpoint: "https://<evidence-store-host>"
  # auth:
  #   enabled: true
  #   token_url: "https://<keycloak-host>/realms/<realm>/protocol/openid-connect/token"
  #   client_id: "<keycloak-service-client-id>"
  #   client_secret: "<keycloak-service-client-secret>"   # prefer a secret store over inlining
  # tls:
  #   ca_file: "/etc/ssl/certs/emerald-ca.pem"            # only if your CA chain needs it

# OpenNebula Evidence Metadata
evidence:
  # Tool ID sent with every evidence payload (identifies the source).
  # Free-form string; tools are created implicitly on first evidence submission.
  tool_id: "opennebula-addon-confirmate-evidence"

  # REQUIRED. Target of Evaluation UUID. Create the ToE in the EMERALD UI
  # (Targets of Evaluation), then copy its "Target ID" from the ToE's
  # "Information" tab and paste it here. The all-zeros value below is only a
  # placeholder: the addon refuses to start until you replace it with a real
  # UUID (otherwise the orchestrator rejects every evidence).
  target_of_evaluation_id: "00000000-0000-0000-0000-000000000000"

  # Default geo-location for resources (ISO 3166 region or custom label)
  default_region: "eu-south-1"

# Logging
logging:
  # Log level: debug, info, warn, error
  level: "info"

  # Log file path (must be writable by the oneadmin user)
  file: "/var/log/one/confirmate-evidence.log"

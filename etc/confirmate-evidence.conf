# =============================================================================
# addon-confirmate-evidence - Configuration
# =============================================================================
# Evidence Collection Gateway for OpenNebula -> Confirmate integration
# Part of the EMERALD project (EU Horizon Europe, Grant No. 101120688)
# =============================================================================

# Confirmate Evidence Store connection
confirmate:
  # REST endpoint of the Confirmate orchestrator
  # (default port is 8080; the Evidence Store is mounted at /v1/evidence_store)
  endpoint: "http://localhost:8080"

  # Authentication
  #
  # When the orchestrator is started with --auth-enabled=false (the default
  # for local testing with --db-in-memory), leave `enabled: false` here and
  # no Authorization header will be sent. For a production deployment the
  # orchestrator runs with --auth-enabled=true and this addon must obtain a
  # JWT via OAuth 2.0 client credentials.
  auth:
    enabled: false

    # OAuth 2.0 client credentials grant against Confirmate's embedded OAuth
    # server (or any compatible IdP). The defaults below match the
    # orchestrator's built-in service client.
    token_url: "http://localhost:8080/v1/auth/token"
    client_id: "confirmate"
    client_secret: "confirmate"

    # Or use a pre-generated static token (for testing / debugging).
    # Uncomment and set to bypass the OAuth flow:
    # static_token: "eyJhbGciOi..."

# OpenNebula Evidence Metadata
evidence:
  # Tool ID sent with every evidence payload (identifies the source).
  # Free-form string; tools are created implicitly on first evidence submission.
  tool_id: "opennebula-addon-confirmate-evidence"

  # Target of Evaluation UUID. The ToE is created in the EMERALD UI
  # (Confirmate orchestrator); paste its UUID here.
  # All zeros is a placeholder and will not pass orchestrator validation.
  target_of_evaluation_id: "00000000-0000-0000-0000-000000000000"

  # Default geo-location for resources (ISO 3166 region or custom label)
  default_region: "eu-south-1"

# Logging
logging:
  # Log level: debug, info, warn, error
  level: "info"

  # Log file path (must be writable by the oneadmin user)
  file: "/var/log/one/confirmate-evidence.log"

# =============================================================================
# addon-clouditor-evidence - Configuration
# =============================================================================
# Evidence Collection Gateway for OpenNebula -> Clouditor integration
# Part of the EMERALD project (EU Horizon Europe, Grant No. 101120688)
# =============================================================================

# Clouditor Evidence Store connection
clouditor:
  # REST endpoint (preferred for simplicity)
  endpoint: "http://localhost:8082"

  # gRPC endpoint (alternative, not used by default)
  # grpc_endpoint: "localhost:9090"

  # OAuth2 client credentials for authenticating with Clouditor
  auth:
    # Token endpoint (Clouditor's built-in OAuth2 server)
    token_url: "http://localhost:8082/v1/auth/token"
    username: "clouditor"
    password: "clouditor"

    # Or use a pre-generated static token (for testing/development)
    # Uncomment and set to bypass OAuth2 flow:
    # static_token: "eyJhbGciOi..."

# OpenNebula Evidence Metadata
evidence:
  # Tool ID sent with every evidence payload (identifies the source)
  tool_id: "opennebula-addon-clouditor-evidence"

  # Cloud Service ID (UUID, configured in Clouditor orchestrator)
  # Update this after running seed-emerald-metrics.sh or registering
  # your cloud service in Clouditor
  cloud_service_id: "00000000-0000-0000-0000-000000000000"

  # Default geo-location for resources (ISO 3166 region or custom label)
  default_region: "eu-south-1"

# Logging
logging:
  # Log level: debug, info, warn, error
  level: "info"

  # Log file path (must be writable by the oneadmin user)
  file: "/var/log/one/clouditor-evidence.log"
